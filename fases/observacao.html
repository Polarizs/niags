<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Fase 1 | NIAGS</title>

  <link rel="stylesheet" href="fase-01.css">
</head>

<body>
  <main class="fase">

    <section class="conteudo-fase">

      <h1 class="titulo-fase">
        Fase 1: OBSERVAÇÃO
      </h1>

      <p class="pergunta">
        “você sabe onde está?”
      </p>

      <div class="texto-enigma">
        <p>
          “ELE” tem um nome.
        </p>

        <p>
          Você já leu esse nome antes.
        </p>
      </div>

      <form id="formResposta" class="area-resposta">

        <p
          id="mensagemResposta"
          class="mensagem-resposta"
          aria-live="polite"
        ></p>

        <input
          id="campoResposta"
          class="campo-resposta"
          type="text"
          autocomplete="off"
          placeholder="digite sua resposta aqui"
          required
        >

        <button
          class="botao-continuar"
          type="submit"
        >
          CONTINUAR
        </button>

      </form>
	  
	  <section
  id="areaRespostaRevelada"
  class="area-resposta-revelada"
  hidden
>
  <button
    id="botaoRevelarResposta"
    class="botao-revelar-resposta"
    type="button"
  >
    REVELAR RESPOSTA
  </button>

  <p
  id="respostaRevelada"
  class="resposta-revelada"
  hidden
></p>
</section>

    </section>

  </main>

  <div
    id="transicaoFase"
    class="transicao-fase"
  ></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../niags-api.js"></script>
<script src="fase-01.js"></script>
</body>
</html>
