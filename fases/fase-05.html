<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Fase 5 | NIAGS</title>

  <link rel="stylesheet" href="fase-05.css">
</head>

<body>
  <main class="fase">

    <section class="conteudo-fase">

      <h1 class="titulo-fase">
        Fase 5: CONFUSÃO
      </h1>

      <p class="frase-principal">
        "Você é o meu roma*. Eu te oma*"
      </p>

      <div class="area-enigma">

        <div class="lista-palavras">
          <p>AMOR*</p>
          <p>AZUL</p>
          <p>OPAS*</p>
          <p>OUTRO</p>
        </div>

        <p class="pergunta-pilar">
          UM FORTE PILAR?
        </p>

      </div>

      <form id="formResposta" class="area-resposta">

        <p
          id="mensagemResposta"
          class="mensagem-resposta"
          aria-live="polite"
        ></p>

        <input
          id="campoResposta"
          class="campo-resposta"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="digite sua resposta aqui"
          required
        >

        <button
          class="botao-continuar"
          type="submit"
        >
          CONTINUAR
        </button>

      </form>

      <section
        id="areaRespostaRevelada"
        class="area-resposta-revelada"
        hidden
      >
        <button
          id="botaoRevelarResposta"
          class="botao-revelar-resposta"
          type="button"
        >
          REVELAR RESPOSTA
        </button>

        <p
          id="respostaRevelada"
          class="resposta-revelada"
          hidden
        >
          osar
        </p>
      </section>

    </section>

  </main>

  <div
    id="transicaoFase"
    class="transicao-fase"
  ></div>

  <script src="fase-05.js"></script>
</body>
</html>
