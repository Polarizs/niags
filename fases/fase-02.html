<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Fase 2 | NIAGS</title>

  <link rel="stylesheet" href="fase-02.css">
</head>
<body>
  <main class="fase">
    <section class="conteudo-fase">

      <h1 class="titulo-fase">Fase 2: RUÍNA</h1>

      <div class="enigma">
        <p class="morse">...- --- .-.. - .- .-.</p>
      </div>

      <p
        id="mensagemResposta"
        class="mensagem-resposta"
        aria-live="polite"
      ></p>

      <div class="area-resposta">
        <input
          id="campoResposta"
          class="campo-resposta"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="digite sua resposta aqui"
          maxlength="60"
        >

        <button
          id="botaoContinuar"
          class="botao-continuar"
          type="button"
        >
          CONTINUAR
        </button>
      </div>
	  
	  <section
  id="areaRespostaRevelada"
  class="area-resposta-revelada"
  hidden
>
  <button
    id="botaoRevelarResposta"
    class="botao-revelar-resposta"
    type="button"
  >
    REVELAR RESPOSTA
  </button>

  <p
    id="respostaRevelada"
    class="resposta-revelada"
    hidden
  >
    voltar
  </p>
</section>

    </section>
  </main>

  <div
    id="transicaoFase"
    class="transicao-fase"
  ></div>

  <script src="fase-02.js"></script>
</body>
</html>
