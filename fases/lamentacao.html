<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Fase 10 | NIAGS</title>

  <link rel="stylesheet" href="fase-10.css">
</head>

<body>
  <img
    src="../assets/fase-10-seta.png"
    alt=""
    class="seta-canto"
    draggable="false"
  >

  <main class="fase">

    <section class="conteudo-fase">

      <h1 class="titulo-fase">
        Fase 10: <span>DÉJÀ VU.</span>
      </h1>

      <div class="aviso-enigma enigma-bloqueado">
        <p class="niags-centro">
  NIAGS
</p>

<p class="aviso-fase-dez">
  AVISO...
</p>

<p class="numero-tempo">
  6.
</p>

        <img
          src="../assets/fase-10-paisagem.png"
          alt=""
          class="imagem-ilusao"
          draggable="false"
        >
      </div>

      <form id="formResposta" class="area-resposta">

        <p
          id="mensagemResposta"
          class="mensagem-resposta"
          aria-live="polite"
        ></p>

        <input
          id="campoResposta"
          class="campo-resposta"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="digite sua resposta aqui"
          required
        >

        <button
          class="botao-continuar"
          type="submit"
        >
          CONTINUAR
        </button>

      </form>

      <section
        id="areaRespostaRevelada"
        class="area-resposta-revelada"
        hidden
      >
        <button
          id="botaoRevelarResposta"
          class="botao-revelar-resposta"
          type="button"
        >
          REVELAR RESPOSTA
        </button>

        <p
          id="respostaRevelada"
          class="resposta-revelada"
          hidden
        ></p>
      </section>

    </section>

  </main>
  
    <section
    id="telaFinal"
    class="tela-final"
    hidden
  >
    <div class="conteudo-final">
      <p class="final-niags">
        NIAGS
      </p>

      <h2>
        PARTE 1 CONCLUÍDA
      </h2>

      <p>
        Obrigado por observar até aqui.
      </p>

      <p>
        Os arquivos foram encerrados por enquanto.
      </p>

      <p class="parte-dois">
        PARTE 2 EM BREVE.
      </p>

      <button
        id="botaoVoltarRegistro"
        class="botao-voltar-registro"
        type="button"
      >
        VOLTAR AO REGISTRO
      </button>
    </div>
  </section>

  <div
    id="transicaoFase"
    class="transicao-fase"
  ></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../niags-api.js"></script>
<script src="fase-10.js"></script>
</body>
</html>
