<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>NIAGS</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Vídeo de fundo -->
  <video class="fundo-video" autoplay muted loop playsinline>
    <source src="https://mwmfperxmifybalvqjrq.supabase.co/storage/v1/object/public/niags-assets/guia.mp4" type="video/mp4">
  </video>

  <!-- Camada escura sobre o vídeo -->
  <div class="escurecer"></div>

  <!-- Linha espectral estilo startup -->
<!-- Linha espectral estilo startup -->
<div class="onda-sistema" aria-hidden="true">
  <svg
    viewBox="0 0 1440 360"
    preserveAspectRatio="none"
  >
    <defs>
      <linearGradient
        id="gradiente-linha"
        x1="0"
        y1="0"
        x2="1"
        y2="0"
      >
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
        <stop offset="16%" stop-color="#dfe7ff" stop-opacity="0.12" />
        <stop offset="50%" stop-color="#ffffff" stop-opacity="0.42" />
        <stop offset="84%" stop-color="#dfe7ff" stop-opacity="0.12" />
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
      </linearGradient>

      <filter id="blur-linha">
        <feGaussianBlur stdDeviation="7" />
      </filter>

      <filter id="brilho-linha">
        <feGaussianBlur stdDeviation="3" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>

    <!-- névoa larga e contínua -->
    <path
      class="linha-nevoa linha-nevoa-1"
      d="
        M-180 190
        C40 135 220 120 380 165
        C520 205 615 225 720 168
        C838 104 964 118 1100 170
        C1245 225 1395 200 1620 138
      "
    />

    <!-- segunda névoa, mais baixa e suave -->
    <path
      class="linha-nevoa linha-nevoa-2"
      d="
        M-180 212
        C50 170 245 150 400 184
        C545 216 640 238 750 184
        C870 126 990 134 1130 184
        C1280 236 1420 220 1620 164
      "
    />

    <!-- fio principal contínuo -->
    <path
      class="linha-principal"
      d="
        M-180 194
        C36 142 222 126 380 165
        C520 199 618 224 720 168
        C834 106 960 120 1100 170
        C1248 224 1400 198 1620 142
      "
    />
  </svg>
</div>

  <!-- NIAGS fantasma aparece primeiro na direita -->
  <div class="niags-fantasma" aria-hidden="true">
    NIAGS
  </div>

  <main class="cena">

    <!-- Título NIAGS central -->
    <header class="titulo-niags">
      <span class="ornamento ornamento-esquerda">
        <span class="linha-ornamento"></span>
        <span class="ponto-ornamento"></span>
      </span>

      <h1 class="texto-niags">NIAGS</h1>

      <span class="ornamento ornamento-direita">
        <span class="ponto-ornamento"></span>
        <span class="linha-ornamento"></span>
      </span>
    </header>

    <!-- Poema -->
    <section class="poema">
      <p class="linha linha-1">
        "O observador é, de certa forma,
      </p>

      <p class="linha linha-2">
        um participante da vida que se agarra aos vivos..."
      </p>

      <p class="autor">-Franz Kafka</p>
    </section>

    <!-- Área completa do login -->
    <section id="painelAcesso" class="painel-acesso">

      <!-- Aviso -->
      <aside class="aviso-senha">
        Não use senhas pessoais. Crie uma senha aleatória e
        exclusiva para o NIAGS, utilizada somente para salvar
        seu progresso.
      </aside>

      <!-- Login -->
      <section
        class="area-login"
        aria-labelledby="tituloLogin"
      >
        <h2 id="tituloLogin" class="titulo-login">
          LOGIN
        </h2>

        <form id="formLogin" class="form-login">

          <div class="campo-login">
            <label for="usuario">usuário:</label>

            <input
              id="usuario"
              name="usuario"
              type="text"
              maxlength="30"
              autocomplete="username"
              required
            >
          </div>

          <div class="campo-login">
            <label for="senha">senha:</label>

            <input
              id="senha"
              name="senha"
              type="password"
              maxlength="60"
              autocomplete="new-password"
              required
            >
          </div>

          <p
            id="erroLogin"
            class="erro-login"
            aria-live="polite"
          ></p>

          <button type="submit" class="botao-acessar">
            acessar
          </button>
        </form>
      </section>

    </section>

    <!-- Só aparece depois do login -->
    <button
      id="botaoDesafio"
      class="botao-desafio"
      type="button"
    >
      ACESSAR ARQUIVOS
    </button>

  </main>

  <!-- Escurecimento ao trocar de página -->
  <div id="transicaoPagina" class="transicao-pagina"></div>

  <!-- Som ambiente -->
  <audio
    id="somAdentro"
    src="https://mwmfperxmifybalvqjrq.supabase.co/storage/v1/object/public/niags-assets/adentro.mp3"
    loop
    preload="auto"
  ></audio>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="niags-api.js"></script>
<script src="script.js"></script>
</body>
</html>
